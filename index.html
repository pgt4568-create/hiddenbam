<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>히든밤 (Hidden Bomb) - 다인용 보드게임</title>
    <style>
        :root {
            --primary-color: #4a90e2;
            --success-color: #2ecc71;
            --danger-color: #e74c3c;
            --bg-color: #f5f7fa;
            --card-back: #2c3e50;
        }

        body {
            font-family: 'Malgun Gothic', sans-serif;
            background-color: var(--bg-color);
            margin: 0;
            padding: 15px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 5px;
            font-size: 2.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
            text-align: center;
        }

        .subtitle {
            color: #7f8c8d;
            margin-bottom: 15px;
            font-size: 1rem;
            text-align: center;
        }

        /* 게임 설정 바 (인원수 선택) */
        .setup-bar {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: white;
            padding: 8px 15px;
            border-radius: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            align-items: center;
        }

        .setup-bar label {
            font-weight: bold;
            color: #34495e;
            font-size: 0.95rem;
        }

        .player-btn {
            padding: 5px 12px;
            border: 2px solid #e0e0e0;
            background: white;
            border-radius: 15px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.2s;
        }

        .player-btn.active {
            background: var(--primary-color);
            color: white;
            border-color: var(--primary-color);
        }

        /* 게임 레이아웃 */
        .game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
            width: 100%;
            max-width: 900px;
        }

        /* 대시보드 */
        .dashboard {
            display: flex;
            justify-content: space-between;
            align-items: center;
            width: 100%;
            background: white;
            padding: 15px 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            box-sizing: border-box;
        }

        .info-panel {
            font-size: 1.1rem;
            color: #34495e;
            line-height: 1.6;
        }

        .info-panel span {
            font-weight: bold;
            color: var(--primary-color);
        }

        /* 주사위 스타일 */
        .dice-area {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
        }

        .dice {
            width: 65px;
            height: 65px;
            background: white;
            border: 3px solid #34495e;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: #34495e;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            user-select: none;
        }

        .dice:hover { transform: scale(1.05); }
        .dice:active { transform: scale(0.95); }
        .dice.rolling { animation: spin 0.6s ease-in-out; }

        @keyframes spin {
            0% { transform: rotate(0deg) scale(0.9); }
            50% { transform: rotate(180deg) scale(1.1); }
            100% { transform: rotate(360deg) scale(1); }
        }

        /* 플레이어 점수판 (4~6인) */
        .scoreboard {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
            width: 100%;
        }

        .player-box {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 12px;
            padding: 10px;
            text-align: center;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        /* 현재 차례인 플레이어 강조 */
        .player-box.active {
            border-color: var(--danger-color);
            background: #fff8f8;
            transform: translateY(-3px);
            box-shadow: 0 4px 12px rgba(231, 76, 60, 0.2);
        }

        .player-box.active::before {
            content: "MY TURN!";
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: var(--danger-color);
            color: white;
            font-size: 0.65rem;
            font-weight: bold;
            padding: 2px 0;
        }

        .player-name {
            font-weight: bold;
            font-size: 0.95rem;
            color: #2c3e50;
            margin-top: 5px;
        }

        .player-score {
            font-size: 1.4rem;
            font-weight: bold;
            color: var(--primary-color);
            margin-top: 5px;
        }

        /* 카드 보드판 */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            width: 100%;
        }

        /* 카드 3D 효과 */
        .card-container {
            perspective: 1000px;
            height: 150px;
        }

        .card {
            width: 100%;
            height: 100%;
            position: relative;
            transform-style: preserve-3d;
            transition: transform 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
        }

        .card.flipped { transform: rotateY(180deg); }

        .card-face {
            position: absolute;
            width: 100%;
            height: 100%;
            backface-visibility: hidden;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 12px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
            font-weight: bold;
            text-align: center;
            font-size: 0.95rem;
            word-break: keep-all;
        }

        .card-front {
            background-color: white;
            color: #2c3e50;
            transform: rotateY(180deg);
            border: 2px solid #e0e0e0;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }

        .card-type-badge {
            font-size: 0.75rem;
            padding: 2px 8px;
            border-radius: 20px;
            align-self: flex-end;
            margin-top: 5px;
        }

        .type-fact { background-color: #ebf5fb; color: #2980b9; }
        .type-opinion { background-color: #fdf2e9; color: #e67e22; }

        .card-back {
            background: linear-gradient(135deg, var(--card-back), #1a252f);
            color: white;
            border: 2px solid #34495e;
        }

        .card-back::after { content: "💥"; font-size: 2.2rem; opacity: 0.8; }

        /* 메시지 알림 */
        .status-message {
            font-size: 1.2rem;
            font-weight: bold;
            color: #2c3e50;
            min-height: 30px;
            text-align: center;
            margin: 5px 0;
            padding: 10px;
            background: white;
            width: 100%;
            border-radius: 10px;
            box-sizing: border-box;
            box-shadow: 0 2px 5px rgba(0,0,0,0.03);
        }

        /* 반응형 최적화 */
        @media (max-width: 600px) {
            .board { gap: 8px; }
            .card-container { height: 120px; }
            .card-face { font-size: 0.8rem; padding: 8px; }
            .card-back::after { font-size: 1.5rem; }
            .scoreboard { grid-template-columns: repeat(3, 1fr); }
            .player-score { font-size: 1.2rem; }
            h1 { font-size: 1.8rem; }
        }
    </style>
</head>
<body>

    <h1>💣 히든밤 (Hidden Bomb)</h1>
    <div class="subtitle">사실과 의견을 구분하여 카드를 획득하는 다인용 보드게임!</div>

    <!-- 인원수 선택 설정 바 -->
    <div class="setup-bar">
        <label>참가 인원:</label>
        <button class="player-btn active" onclick="changePlayerCount(4)">4명</button>
        <button class="player-btn" onclick="changePlayerCount(5)">5명</button>
        <button class="player-btn" onclick="changePlayerCount(6)">6명</button>
        <button class="player-btn" style="background:#34495e; color:white; margin-left:10px;" onclick="initGame()">🔄 새 게임</button>
    </div>

    <div class="game-container">
        <!-- 대시보드 -->
        <div class="dashboard">
            <div class="info-panel">
                <div>현재 차례: <span id="current-player-display" style="color:#e74c3c; font-size:1.3rem;">플레이어 1</span></div>
                <div>남은 카드 더미: <span id="deck-count">0</span>장</div>
                <div>남은 뒤집기 횟수: <span id="turns-left">주사위를 굴려주세요</span></div>
            </div>
            
            <div class="dice-area">
                <div class="dice" id="dice-btn">🎲</div>
                <div style="font-size: 0.8rem; color:#7f8c8d; font-weight: bold;">터치하여 굴리기</div>
            </div>
        </div>

        <!-- 알림 메시지 -->
        <div class="status-message" id="status-text">주사위를 굴려 게임을 시작해 주세요!</div>

        <!-- 플레이어 점수판 -->
        <div class="scoreboard" id="scoreboard"></div>

        <!-- 카드 보드판 -->
        <div class="board" id="board"></div>
    </div>

    <script>
        // 사실과 의견 카드 풀 (총 53장)
        const rawCardPool = [
            { type: "fact", text: "지구는 태양 주위를 공전한다." },
            { type: "fact", text: "대한민국의 수도는 서울이다." },
            { type: "fact", text: "물은 섭씨 100도에서 끓는다." },
            { type: "fact", text: "올림픽은 4년마다 개최된다." },
            { type: "fact", text: "나비는 곤충류에 속한다." },
            { type: "fact", text: "세종대왕은 훈민정음을 창제하셨다." },
            { type: "fact", text: "컴퓨터는 이진법을 사용하여 연산한다." },
            { type: "fact", text: "한글의 자음은 총 14개이다." },
            { type: "fact", text: "태양계에서 가장 큰 행성은 목성이다." },
            { type: "fact", text: "스마트폰은 전자기기이다." },
            { type: "fact", text: "사과는 나무에서 자라는 과일이다." },
            { type: "fact", text: "1년은 보통 365일이다." },
            { type: "fact", text: "강아지는 네 발로 걷는다." },
            { type: "fact", text: "고양이는 수염이 있다." },
            { type: "fact", text: "토끼는 긴 귀를 가지고 있다." },
            { type: "fact", text: "사자는 동물이다." },
            { type: "fact", text: "펭귄은 새의 한 종류이다." },
            { type: "fact", text: "물고기는 아가미로 숨을 쉰다." },
            { type: "fact", text: "연필은 글씨를 쓸 때 사용한다." },
            { type: "fact", text: "비가 오면 우산을 쓴다." },
            { type: "fact", text: "자동차는 바퀴로 움직인다." },
            { type: "fact", text: "겨울에는 날씨가 춥다." },
            { type: "fact", text: "학생들은 학교에서 공부한다." },
            { type: "fact", text: "여름에는 매미가 운다." },
            { type: "fact", text: "개미는 곤충이다." },
            { type: "fact", text: "해는 동쪽에서 뜬다." },
            { type: "fact", text: "코끼리는 긴 코를 가지고 있다." },
            { type: "fact", text: "기린은 목이 길다." },
            { type: "fact", text: "자전거에는 바퀴가 있다." },
            { type: "opinion", text: "수학은 모든 과목 중에서 가장 재미있다." },
            { type: "opinion", text: "오늘 날씨는 매우 상쾌하고 좋다." },
            { type: "opinion", text: "딸기 아이스크림이 초코맛보다 맛있다." },
            { type: "opinion", text: "강아지는 고양이보다 귀여운 동물이다." },
            { type: "opinion", text: "축구는 보는 것보다 직접 하는 게 더 즐겁다." },
            { type: "opinion", text: "이 책은 올해 최고의 베스트셀러가 될 것이다." },
            { type: "opinion", text: "파란색은 마음을 가장 편안하게 해 준다." },
            { type: "opinion", text: "겨울보다는 따뜻한 여름이 훨씬 낫다." },
            { type: "opinion", text: "그 영화는 너무 지루해서 졸릴 지경이었다." },
            { type: "opinion", text: "매운 음식을 잘 먹는 사람이 멋있다." },
            { type: "opinion", text: "이 게임은 세상에서 가장 짜릿하다." },
            { type: "opinion", text: "민트초코는 최고의 디저트 맛이다." },
            { type: "opinion", text: "독도는 정말 멋있다." },
            { type: "opinion", text: "강아지는 가장 귀여운 동물이다." },
            { type: "opinion", text: "고양이는 강아지보다 더 사랑스럽다." },
            { type: "opinion", text: "토끼를 키우는 것이 좋다." },
            { type: "opinion", text: "사자는 가장 멋진 동물이다." },
            { type: "opinion", text: "개미를 관찰하는 것은 재미있다." },
            { type: "opinion", text: "자전거 타기는 최고의 운동이다." },
            { type: "opinion", text: "겨울이 여름보다 더 좋다." },
            { type: "opinion", text: "여행은 사람을 행복하게 만든다." },
            { type: "opinion", text: "운동을 열심히 해야 한다." },
            { type: "opinion", text: "공공예절을 잘 지켜야 한다." },
            { type: "opinion", text: "기린은 정말 멋지다." }
        ];

        // 게임 상태 변수
        let cardDeck = [];
        let boardCards = [];
        let selectedCards = [];
        
        let playerCount = 4; // 기본 4인 플레이
        let currentPlayerIndex = 0; // 0번 플레이어부터 시작
        let playerScores = []; // 각 플레이어 점수
        
        let diceValue = 0;
        let turnsLeft = 0;
        let isProcessing = false;

        // UI 요소
        const diceBtn = document.getElementById('dice-btn');
        const deckCountEl = document.getElementById('deck-count');
        const turnsLeftEl = document.getElementById('turns-left');
        const statusTextEl = document.getElementById('status-text');
        const boardEl = document.getElementById('board');
        const scoreboardEl = document.getElementById('scoreboard');
        const currentPlayerDisplayEl = document.getElementById('current-player-display');

        // 플레이어 인원 변경
        function changePlayerCount(count) {
            if (isProcessing) return;
            playerCount = count;
            
            // 버튼 스타일 업데이트
            document.querySelectorAll('.player-btn').forEach((btn, idx) => {
                if (idx < 3) {
                    btn.classList.toggle('active', (idx + 4) === count);
                }
            });
            
            initGame();
        }

        // 카드 섞기
        function shuffle(array) {
            for (let i = array.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [array[i], array[j]] = [array[j], array[i]];
            }
            return array;
        }

        // 게임 초기화
        function initGame() {
            cardDeck = shuffle([...rawCardPool]);
            boardCards = [];
            selectedCards = [];
            
            currentPlayerIndex = 0;
            playerScores = Array(playerCount).fill(0);
            
            diceValue = 0;
            turnsLeft = 0;
            isProcessing = false;

            turnsLeftEl.textContent = "주사위를 굴려주세요";
            turnsLeftEl.style.color = "#e74c3c";
            statusTextEl.innerHTML = `<strong>[플레이어 1]</strong>님, 주사위를 굴려 게임을 시작하세요!`;
            diceBtn.textContent = "🎲";

            // 초기 9장 카드 세팅
            for (let i = 0; i < 9; i++) {
                boardCards.push(cardDeck.length > 0 ? cardDeck.pop() : null);
            }

            renderScoreboard();
            renderBoard();
            updateDeckCount();
            updateCurrentPlayerUI();
        }

        // 남은 카드 갱신
        function updateDeckCount() {
            deckCountEl.textContent = cardDeck.length;
        }

        // 현재 차례 UI 업데이트
        function updateCurrentPlayerUI() {
            const currentName = `플레이어 ${currentPlayerIndex + 1}`;
            currentPlayerDisplayEl.textContent = currentName;
            
            // 점수판 하이라이트 갱신
            document.querySelectorAll('.player-box').forEach((box, idx) => {
                box.classList.toggle('active', idx === currentPlayerIndex);
            });
        }

        // 점수판 렌더링
        function renderScoreboard() {
            scoreboardEl.innerHTML = '';
            for (let i = 0; i < playerCount; i++) {
                const box = document.createElement('div');
                box.classList.add('player-box');
                if (i === currentPlayerIndex) box.classList.add('active');
                
                box.innerHTML = `
                    <div class="player-name">👤 플레이어 ${i + 1}</div>
                    <div class="player-score" id="score-val-${i}">${playerScores[i]}장</div>
                `;
                scoreboardEl.appendChild(box);
            }
        }

        // 개별 플레이어 점수 텍스트 갱신
        function updateScoreDisplay() {
            for (let i = 0; i < playerCount; i++) {
                const scoreEl = document.getElementById(`score-val-${i}`);
                if (scoreEl) scoreEl.textContent = `${playerScores[i]}장`;
            }
        }

        // 보드판 렌더링
        function renderBoard() {
            boardEl.innerHTML = '';
            boardCards.forEach((cardData, index) => {
                const cardContainer = document.createElement('div');
                cardContainer.classList.add('card-container');

                if (!cardData) {
                    cardContainer.style.visibility = "hidden";
                    boardEl.appendChild(cardContainer);
                    return;
                }

                const card = document.createElement('div');
                card.classList.add('card');
                card.dataset.index = index;

                const cardFront = document.createElement('div');
                cardFront.classList.add('card-face', 'card-front');
                
                const textSpan = document.createElement('span');
                textSpan.textContent = cardData.text;
                
                const typeBadge = document.createElement('span');
                typeBadge.classList.add('card-type-badge', cardData.type === 'fact' ? 'type-fact' : 'type-opinion');
                typeBadge.textContent = cardData.type === 'fact' ? "사실" : "의견";

                cardFront.appendChild(textSpan);
                cardFront.appendChild(typeBadge);

                const cardBack = document.createElement('div');
                cardBack.classList.add('card-face', 'card-back');

                card.appendChild(cardFront);
                card.appendChild(cardBack);
                cardContainer.appendChild(card);
                boardEl.appendChild(cardContainer);

                card.addEventListener('click', () => handleCardClick(card, index));
            });
        }

        // 주사위 굴리기
        diceBtn.addEventListener('click', () => {
            if (isProcessing) return;
            if (turnsLeft > 0) {
                statusTextEl.textContent = "아직 뒤집을 카드가 남아있습니다!";
                return;
            }

            // 바닥에 남은 유효 카드 수 확인 (주사위 눈이 남은 카드보다 크면 남은 카드 수로 맞춤)
            const activeCardsCount = boardCards.filter(c => c !== null).length;
            if (activeCardsCount === 0) return;

            diceBtn.classList.add('rolling');
            isProcessing = true;
            statusTextEl.textContent = `[플레이어 ${currentPlayerIndex + 1}] 주사위 굴리는 중...`;

            setTimeout(() => {
                diceValue = Math.floor(Math.random() * 6) + 1;
                diceBtn.textContent = diceValue;
                diceBtn.classList.remove('rolling');
                
                // 만약 주사위 눈이 남은 카드 수보다 많다면 남은 카드 수만큼만 뒤집도록 안전장치 적용
                turnsLeft = Math.min(diceValue, activeCardsCount);
                turnsLeftEl.textContent = `${turnsLeft}번 남음`;
                turnsLeftEl.style.color = "#34495e";
                
                statusTextEl.innerHTML = `<strong>[플레이어 ${currentPlayerIndex + 1}]</strong> 주사위 결과: <strong>${diceValue}</strong>! 카드를 ${turnsLeft}장 뒤집으세요.`;
                
                resetCurrentTurnSelection();
                isProcessing = false;
            }, 600);
        });

        function resetCurrentTurnSelection() {
            selectedCards = [];
            document.querySelectorAll('.card').forEach(card => card.classList.remove('flipped'));
        }

        // 카드 클릭 핸들러
        function handleCardClick(cardElement, index) {
            if (isProcessing) return;
            if (turnsLeft <= 0) {
                statusTextEl.innerHTML = `먼저 주사위를 굴려주세요!`;
                return;
            }
            if (cardElement.classList.contains('flipped')) return;

            cardElement.classList.add('flipped');
            selectedCards.push({ element: cardElement, index: index, data: boardCards[index] });
            
            turnsLeft--;
            turnsLeftEl.textContent = turnsLeft > 0 ? `${turnsLeft}번 남음` : "0번 남음";

            if (turnsLeft === 0) {
                isProcessing = true;
                setTimeout(evaluateTurnResult, 1000);
            }
        }

        // 판정 및 다음 플레이어로 턴 넘기기
        function evaluateTurnResult() {
            const types = selectedCards.map(item => item.data.type);
            const allSame = types.every(type => type === types[0]);
            const currentName = `플레이어 ${currentPlayerIndex + 1}`;

            if (allSame) {
                const collectedCount = selectedCards.length;
                playerScores[currentPlayerIndex] += collectedCount;
                updateScoreDisplay();

                statusTextEl.innerHTML = `<span style="color:var(--success-color);">🎉 성공! [${currentName}]님이 ${types[0] === 'fact' ? '사실' : '의견'} 카드 ${collectedCount}장을 획득했습니다!</span>`;

                selectedCards.forEach(item => {
                    item.element.style.transition = "transform 0.5s, opacity 0.5s";
                    item.element.style.opacity = "0";
                    item.element.style.transform = "scale(0.5) rotateY(180deg)";
                });

                setTimeout(() => {
                    selectedCards.forEach(item => {
                        boardCards[item.index] = cardDeck.length > 0 ? cardDeck.pop() : null;
                    });
                    
                    renderBoard();
                    updateDeckCount();
                    nextTurn();
                }, 800);

            } else {
                statusTextEl.innerHTML = `<span style="color:var(--danger-color);">❌ 실패! 사실과 의견이 섞여 있어 카드를 가져오지 못합니다.</span>`;
                
                setTimeout(() => {
                    selectedCards.forEach(item => {
                        item.element.classList.remove('flipped');
                    });
                    nextTurn();
                }, 1400);
            }
        }

        // 다음 차례 진행 및 게임 종료 체크
        function nextTurn() {
            // 보드판에 카드가 없고 덱도 비었으면 게임 종료
            const activeCardsOnBoard = boardCards.filter(c => c !== null).length;
            if (activeCardsOnBoard === 0 && cardDeck.length === 0) {
                showGameOver();
                return;
            }

            // 다음 플레이어로 인덱스 변경 (4~6인 순환)
            currentPlayerIndex = (currentPlayerIndex + 1) % playerCount;
            updateCurrentPlayerUI();
            
            turnsLeftEl.textContent = "주사위를 굴려주세요";
            turnsLeftEl.style.color = "#e74c3c";
            statusTextEl.innerHTML = `👉 다음 차례입니다! <strong>[플레이어 ${currentPlayerIndex + 1}]</strong>님, 주사위를 굴려주세요.`;
            
            isProcessing = false;
        }

        // 최종 승자 발표
        function showGameOver() {
            const maxScore = Math.max(...playerScores);
            const winners = [];
            
            playerScores.forEach((score, idx) => {
                if (score === maxScore && maxScore > 0) {
                    winners.push(`플레이어 ${idx + 1}`);
                }
            });

            let winMsg = winners.length > 0 ? `🏆 최종 우승: <strong>${winners.join(', ')}</strong> (${maxScore}장)!` : "무승부입니다!";
            
            statusTextEl.innerHTML = `<span style="color:var(--primary-color); font-size:1.3rem;">🎮 게임 종료! ${winMsg}</span>`;
            turnsLeftEl.textContent = "게임 종료";
            isProcessing = true; // 게임 끝났으므로 클릭 차단
        }

        // 첫 실행
        initGame();
    </script>
</body>
</html>
